*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#eef3f9;
}

.header{
background:#fff;
color:#0f0f0f;
padding:18px;
text-align:center;
font-size:24px;
font-weight:600;
}

.container{
width:95%;
max-width:1300px;
margin:auto;

}

background:white;

border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.12);

<style>

<body>

<div class="main-content">

<div class="header">
 🖨 Antipolo City Health Office ECG Services
</div>

</div>
<div class="dashboard">
    <div class="dashboard-card">
        <div class="card-title">Total ECG Patients Served</div>
        <div id="totalPatients" class="card-number">0</div>
    </div>
</div>

<br>

<br>

<div class="container">

<div class="card">

<form id="patientForm">

<div class="section-title">
Patient Information
</div>

<div class="form-grid">

<div class="form-group">
<label>Date & Time</label>
<input type="datetime-local" name="datetime" required>
</div>

<div class="form-group">
<label>Full Name</label>
<input type="text" name="fullname" required>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group">
<label>Address</label>
<input type="text" name="address">
</div>

<div class="form-group">
<label>Baranggay</label>
<select name="barangay">
<option>Bagong Nayon</option>
<option>Beverly Hills</option>
<option>Calawis</option>
<option>Cupang</option>
<option>Dalig</option>
<option>Dela Paz</option>
<option>Inarawan</option>
<option>Mambugan</option>
<option>Mayamot</option>
<option>Muntindilaw</option>
<option>San Isidro</option>
<option>San Jose</option>
<option>San Juan</option>
<option>San Luis</option>
<option>San Roque</option>
<option>Santa Cruz</option>
<option>Other</option>
</select>
</div>


<div class="form-group">
<label>Contact Number</label>
<input type="text" name="contact">
</div>


<div class="form-group">
<label>Requesting Physician</label>
<input type="text" name="doctor">
</div>
</div>

<button type="submit">
Save Patient Record
</button>

</form>

</div>

</div>

<div class="footer">
Antipolo City Health Office ECG Services <br>Coded by: Erwin R. Alincastre. All Rights Reserved.
</div>

</div>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxch8M6--VyOmbwc--qephK8F7NvvMWKmBsOckzrPGUsif6RfCHZr-FAAsw_oJLmy-Y/exec";

// Load Total Patients
async function loadTotalPatients() {
    try {
        const response = await fetch(scriptURL + "?nocache=" + Date.now());
        const data = await response.json();

        document.getElementById("totalPatients").textContent = data.total;

    } catch (err) {
        console.log(err);
    }
}

// Auto refresh every 3 seconds
setInterval(loadTotalPatients, 3000);

// Load immediately
loadTotalPatients();

// Save Patient
document.getElementById("patientForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const btn = this.querySelector("button");
    btn.disabled = true;
    btn.innerHTML = "Saving...";

    try{

        const response = await fetch(scriptURL,{
            method:"POST",
            body:new FormData(this)
        });

        const result = await response.text();

        if(result=="Success"){

            alert("Patient record saved successfully.");

            this.reset();

            // Update counter immediately
            await loadTotalPatients();

        }else{

            alert(result);

        }

    }catch(err){

        alert("Unable to save patient.");

    }

    btn.disabled=false;
    btn.innerHTML="Save Patient Record";

});
</script>

</body>
